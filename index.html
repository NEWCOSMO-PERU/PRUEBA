<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorHub Premium</title>
    <style>
        :root {
            --primary: #00c6ff;
            --bg: #0b0f19;
            --card: #151b2d;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }

        /* Header */
        header { background: #0b0f19; padding: 1rem 5%; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #2d3748; }
        .logo { font-weight: 800; color: var(--primary); font-size: 1.5rem; }

        /* Feed Estilo OnlyFans */
        .feed { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .post-card { background: var(--card); border-radius: 12px; margin-bottom: 2rem; overflow: hidden; border: 1px solid #2d3748; }
        .post-header { padding: 15px; display: flex; align-items: center; gap: 10px; }
        .avatar-mini { width: 40px; height: 40px; background: #334155; border-radius: 50%; }
        
        /* Contenido Bloqueado (Blur) */
        .media-container { width: 100%; height: 350px; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        .locked-media { filter: blur(15px); width: 100%; height: 100%; background: linear-gradient(45deg, #1e293b, #0f172a); }
        .lock-overlay { position: absolute; text-align: center; }
        
        .btn-subscribe { background: var(--primary); color: #000; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; }

        /* Footer Sticky (Móvil) */
        .mobile-sticky-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 15px; text-align: center; border-top: 2px solid var(--primary); }

        @media (min-width: 768px) {
            .mobile-sticky-bar { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">CreatorHub</div>
    <nav>Perfil | Explorar</nav>
</header>

<main class="feed">
    <div class="post-card">
        <div class="post-header">
            <div class="avatar-mini"></div>
            <strong>Ana Fitness</strong>
        </div>
        <div class="media-container">
            <div class="locked-media"></div>
            <div class="lock-overlay">
                <p>🔒 Contenido exclusivo</p>
                <a href="#" class="btn-subscribe">Suscribirse para ver</a>
            </div>
        </div>
    </div>

    <div class="post-card">
        <div class="post-header">
            <div class="avatar-mini"></div>
            <strong>Carlos Music</strong>
        </div>
        <div class="media-container">
            <div class="locked-media"></div>
            <div class="lock-overlay">
                <p>🔒 Suscríbete para acceder al audio</p>
                <a href="#" class="btn-subscribe">Suscribirse</a>
            </div>
        </div>
    </div>
</main>

<div class="mobile-sticky-bar">
    <a href="#" class="btn-subscribe" style="width: 90%;">Desbloquear todo el contenido</a>
</div>

</body>
</html>
