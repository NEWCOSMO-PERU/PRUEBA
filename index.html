```html
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dashboard Hub</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{

background:
linear-gradient(
180deg,
#08134d,
#02061b
);

color:white;

height:100vh;

overflow:hidden;

}

.container{

display:grid;

grid-template-columns:
250px 1fr;

height:100vh;

}

/* SIDEBAR */

.sidebar{

background:#02081d;

padding:20px;

display:flex;

flex-direction:column;

border-right:
1px solid rgba(255,255,255,.05);

}

/* LOGO */

.logo{

display:flex;

flex-direction:column;

align-items:center;

margin-bottom:25px;

}

.hex{

width:60px;

height:60px;

background:

linear-gradient(
135deg,
#7258ff,
#2687ff
);

clip-path:
polygon(
25% 0,
75% 0,
100% 50%,
75% 100%,
25% 100%,
0 50%
);

margin-bottom:10px;

}

.logo h1{

font-size:26px;

}

.logo span{

opacity:.7;

}

/* MENU */

.menu{

display:flex;

flex-direction:column;

gap:8px;

}

.item{

padding:14px;

border-radius:14px;

cursor:pointer;

}

.active,
.item:hover{

background:

linear-gradient(
90deg,
#3640b8,
#1d245c
);

}

/* CONTENT */

.content{

padding:40px;

overflow:auto;

}

.panel{

display:none;

}

.panel.active{

display:block;

}

h2{

font-size:34px;

margin-bottom:12px;

}

.box{

margin-top:20px;

padding:22px;

border-radius:20px;

background:
rgba(255,255,255,.04);

}

/* TOOLS */

.tools{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:18px;

margin-top:30px;

}

.tool{

background:

rgba(255,255,255,.04);

padding:24px;

border-radius:20px;

text-align:center;

}

.icon{

font-size:44px;

margin-bottom:14px;

}

button{

margin-top:16px;

border:none;

padding:12px 18px;

border-radius:12px;

background:

linear-gradient(
90deg,
#5960ff,
#2b87ff
);

color:white;

cursor:pointer;

}

/* APP WINDOWS */

.app{

display:none;

margin-top:20px;

padding:25px;

border-radius:18px;

background:

rgba(255,255,255,.04);

}

.app.active{

display:block;

}

input{

width:100%;

padding:14px;

border:none;

border-radius:12px;

margin-top:12px;

}

textarea{

width:100%;

height:120px;

padding:14px;

border:none;

border-radius:12px;

margin-top:12px;

}

/* MOBILE */

@media(max-width:768px){

body{
overflow:auto;
}

.container{

display:flex;

flex-direction:column;

}

.sidebar{

width:100%;

}

.menu{

flex-direction:row;

overflow:auto;

}

.item{

white-space:nowrap;

}

.content{

padding:20px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">

<div class="hex"></div>

<h1>DASHBOARD</h1>

<span>HUB</span>

</div>


<div class="menu">

<div class="item active"
onclick="show('home',this)">
Inicio
</div>

<div class="item"
onclick="show('books',this)">
BOOKS
</div>

<div class="item"
onclick="show('manuales',this)">
MANUALES
</div>

<div class="item"
onclick="show('store',this)">
STORE
</div>

<div class="item"
onclick="show('tonos',this)">
TONOS
</div>

<div class="item"
onclick="show('utilidades',this)">
UTILIDADES
</div>

</div>

</div>


<div class="content">

<div id="home"
class="panel active">

<h2>Bienvenido</h2>

<p>
Selecciona una sección.
</p>

</div>


<div id="books"
class="panel">

<h2>BOOKS</h2>

</div>


<div id="manuales"
class="panel">

<h2>MANUALES</h2>

</div>


<div id="store"
class="panel">

<h2>STORE</h2>

</div>


<div id="tonos"
class="panel">

<h2>TONOS</h2>

</div>


<div id="utilidades"
class="panel">

<h2>UTILIDADES</h2>

<div class="tools">

<div class="tool">

<div class="icon">
📄
</div>

Convertidor Documentos

<button
onclick="tool('doc')">
Abrir
</button>

</div>


<div class="tool">

<div class="icon">
🖼️
</div>

Convertidor Imagen

<button
onclick="tool('img')">
Abrir
</button>

</div>


<div class="tool">

<div class="icon">
📱
</div>

Generador QR

<button
onclick="tool('qr')">
Abrir
</button>

</div>

</div>


<div id="doc"
class="app">

<h3>Convertidor Documentos</h3>

<input placeholder="Subir archivo">

</div>


<div id="img"
class="app">

<h3>Convertidor Imagen</h3>

<input placeholder="PNG → JPG">

</div>


<div id="qr"
class="app">

<h3>Generador QR</h3>

<textarea placeholder="Escribe texto o URL"></textarea>

</div>

</div>

</div>

</div>

<script>

function show(id,el){

document
.querySelectorAll(".panel")
.forEach(
x=>x.classList.remove("active")
);

document
.getElementById(id)
.classList.add("active");

document
.querySelectorAll(".item")
.forEach(
x=>x.classList.remove("active")
);

el.classList.add("active");

}

function tool(id){

document
.querySelectorAll(".app")
.forEach(
x=>x.classList.remove("active")
);

document
.getElementById(id)
.classList.add("active");

}

</script>

</body>

</html>
```
