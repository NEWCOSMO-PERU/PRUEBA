<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuales Premium | Elite Digital Learning</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-hover: #f3cf55;
            --dark: #090b0e;
            --card: #131722;
            --white: #ffffff;
            --text-muted: #8f9cae;
            --border: rgba(212, 175, 55, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Estilos Modo Claro */
        body.light-mode {
            --dark: #f4f6f9;
            --card: #ffffff;
            --white: #111111;
            --text-muted: #555555;
            --border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: var(--dark);
            color: var(--white);
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(12px);
            padding: 18px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        body.light-mode header {
            background: rgba(255, 255, 255, 0.85);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--gold);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--white);
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .icon-btn:hover {
            color: var(--gold);
        }

        #cartBadge {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #e74c3c;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
        }

        /* --- HERO --- */
        .hero {
            padding: 140px 8% 100px;
            text-align: center;
            background: radial-gradient(circle at top, #1a1a1a 0%, var(--dark) 70%);
            position: relative;
        }
        body.light-mode .hero {
            background: radial-gradient(circle at top, #e2e8f0 0%, var(--dark) 70%);
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            color: var(--white);
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero h1 span {
            color: var(--gold);
            background: linear-gradient(45deg, #d4af37, #f3cf55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 19px;
            max-width: 650px;
            margin: 0 auto 35px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: var(--gold);
            color: #000;
            font-weight: 600;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
            transition: var(--transition);
        }

        .btn:hover {
            background: var(--gold-hover);
            transform: translateY(-2px);
        }

        /* --- STATS --- */
        .stats {
            padding: 40px 8%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            margin-top: -40px;
        }

        .stat {
            background: var(--card);
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .stat h2 {
            color: var(--gold);
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat p {
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- FILTROS Y BUSCADOR --- */
        .controls-container {
            padding: 60px 8% 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 550px;
        }

        .search-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--white);
            font-size: 16px;
            outline: none;
            transition: var(--transition);
        }

        .search:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
        }

        .filter-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tag {
            padding: 8px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            color: var(--white);
            transition: var(--transition);
        }

        .tag.active, .tag:hover {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            font-weight: 600;
        }

        /* --- CATALOGO PRODUCTOS --- */
        .section-title {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            margin: 40px 0 10px;
        }

        .products {
            padding: 30px 8% 80px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(212,175,55,0.1);
            border-color: rgba(212,175,55,0.4);
        }

        .img-container {
            position: relative;
            overflow: hidden;
            height: 210px;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .card:hover img {
            transform: scale(1.06);
        }

        .badge-cat {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.75);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            border: 1px solid var(--gold);
        }

        .content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .content h3 {
            font-size: 20px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .content p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .price {
            font-size: 24px;
            color: var(--gold);
            font-weight: 700;
        }

        .buy {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .buy:hover {
            background: var(--gold-hover);
            transform: scale(1.03);
        }

        /* --- SIDEBAR CARRITO --- */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: #11141a;
            border-left: 1px solid var(--border);
            box-shadow: -10px 0 40px rgba(0,0,0,0.5);
            z-index: 2000;
            transition: var(--transition);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        body.light-mode .cart-sidebar {
            background: #ffffff;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .item-info h4 { font-size: 14px; margin-bottom: 3px; }
        .item-info p { color: var(--gold); font-weight: 600; font-size: 14px; }

        .remove-item {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 16px;
        }

        .cart-footer-btn {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .total-box {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: var(--transition);
        }

        .checkout-btn:hover {
            background: #1ebd58;
            transform: translateY(-2px);
        }

        .close-cart {
            background: none;
            border: none;
            color: var(--white);
            font-size: 20px;
            cursor: pointer;
        }

        /* --- TESTIMONIALS & FAQ --- */
        .testimonials {
            padding: 40px 8% 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .testimonial {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .stars { color: var(--gold); margin-bottom: 12px; }
        .testimonial p { font-style: italic; color: var(--text-muted); font-size: 15px; margin-bottom: 15px;}

        .faq { padding: 40px 8% 60px; max-width: 800px; margin: 0 auto; }
        details {
            background: var(--card);
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }
        details summary { font-weight: 600; font-size: 16px; outline: none; }
        details p { margin-top: 12px; color: var(--text-muted); font-size: 15px; line-height: 1.6; }

            bottom: 20px;

            z-index:
