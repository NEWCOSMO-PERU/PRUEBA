<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Tony Stan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="profile-section">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <h2>TONY STAN</h2>
                <p>LOREM IPSUM</p>
            </div>
            
            <nav class="menu">
                <a href="#" class="menu-item active"><i class="fa-solid fa-square"></i> DASHBOARD <i class="fa-solid fa-chevron-right arrow"></i></a>
                <a href="#" class="menu-item"><i class="fa-solid fa-crosshairs"></i> TARGET <i class="fa-solid fa-chevron-right arrow"></i></a>
                <a href="#" class="menu-item"><i class="fa-solid fa-chart-bar"></i> CHARTS <i class="fa-solid fa-chevron-right arrow"></i></a>
                <a href="#" class="menu-item"><i class="fa-solid fa-gear"></i> SETTINGS <i class="fa-solid fa-chevron-right arrow"></i></a>
                <a href="#" class="menu-item"><i class="fa-solid fa-envelope"></i> MESSAGES <i class="fa-solid fa-chevron-right arrow"></i></a>
                <a href="#" class="menu-item"><i class="fa-solid fa-wifi"></i> NETWORK <i class="fa-solid fa-chevron-right arrow"></i></a>
            </nav>

            <div class="sidebar-footer">
                <a href="#"><i class="fa-solid fa-chevron-left"></i> BACK</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="left-header">
                    <i class="fa-solid fa-bars toggle-menu"></i>
                    <i class="fa-regular fa-question-circle"></i>
                    <span>OVERVIEW</span>
                </div>
                <div class="search-box">
                    <input type="text" placeholder="Buscar...">
                    <button><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </header>

            <div class="grid-container">
                <div class="card card-purple">
                    <h3>Lorem Ipsum</h3>
                    <div class="card-value">56 <span class="up">(+4)</span></div>
                    <div class="chart-placeholder">[Gráfico de línea]</div>
                </div>
                <div class="card card-orange">
                    <h3>Lorem Ipsum</h3>
                    <div class="card-value">$ 226 <span class="down">(-12)</span></div>
                    <div class="chart-placeholder">[Gráfico de línea]</div>
                </div>
                <div class="card card-teal">
                    <h3>Lorem Ipsum</h3>
                    <div class="card-value">24 <span class="up">(+5)</span></div>
                    <div class="chart-placeholder">[Gráfico de línea]</div>
                </div>

                <div class="card-large-double">
                    <div class="donut-section">
                        <h3>Lorem Ipsum</h3>
                        <div class="donut-chart color-teal">50%</div>
                    </div>
                    <div class="donut-section">
                        <h3>Lorem Ipsum</h3>
                        <div class="donut-chart color-orange">15%</div>
                    </div>
                </div>

                <div class="card card-white-bars">
                    <h3>Lorem Ipsum</h3>
                    <div class="bar-chart-placeholder">[Gráfico de Barras A, B, C]</div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
