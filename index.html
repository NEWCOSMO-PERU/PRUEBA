<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Dashboard Hub</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{

background:
linear-gradient(
180deg,
#071447,
#02061b
);

color:white;

height:100vh;

overflow:hidden;

}

.container{

display:grid;

grid-template-columns:
260px 1fr;

height:100vh;

}

/* SIDEBAR */

.sidebar{

background:#03081c;

padding:24px;

border-right:
1px solid rgba(255,255,255,.06);

display:flex;

flex-direction:column;

}

.logo{

margin-bottom:28px;

}

.logo h1{

font-size:28px;

}

.logo span{

opacity:.7;

}

.menu{

display:flex;

flex-direction:column;

gap:10px;

}

.item{

padding:14px;

border-radius:14px;

cursor:pointer;

white-space:nowrap;

}

.item:hover,
.item.active{

background:

linear-gradient(
90deg,
#3840b8,
#20295f
);

}

/* CONTENT */

.content{

padding:30px;

overflow:auto;

}

.panel{

display:none;

}

.panel.active{

display:block;

}

h2{

font-size:38px;

margin-bottom:14px;

}

.box{

padding:22px;

margin-top:20px;

border-radius:18px;

background:
rgba(255,255,255,.05);

}

p{

line-height:1.7;

color:#c8d1ff;

}

/* MOBILE */

@media(max-width:768px){

body{
overflow:auto;
}

.container{

display:flex;

flex-direction:column;

height:auto;

}

.sidebar{

width:100%;

padding:16px;

border-right:none;

border-bottom:
1px solid rgba(255,255,255,.08);

}

.logo{

margin-bottom:18px;

}

.logo h1{

font-size:22px;

}

.menu{

flex-direction:row;

overflow-x:auto;

gap:8px;

padding-bottom:6px;

}

.menu::-webkit-scrollbar{
display:none;
}

.item{

min-width:max-content;

padding:12px 18px;

font-size:14px;

}

.content{

padding:20px;

}

h2{

font-size:28px;

}

.box{

padding:18px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">

<h1>DASHBOARD</h1>

<span>HUB</span>

</div>

<div class="menu">

<div class="item active"
onclick="openTab('home',this)">
🏠 Inicio
</div>

<div class="item"
onclick="openTab('books',this)">
📚 BOOKS
</div>

<div class="item"
onclick="openTab('manuales',this)">
📘 MANUALES
</div>

<div class="item"
onclick="openTab('store',this)">
🛒 STORE
</div>

<div class="item"
onclick="openTab('tonos',this)">
🎵 TONOS
</div>

<div class="item"
onclick="openTab('utilidades',this)">
🛠 UTILIDADES
</div>

</div>

</div>


<div class="content">

<div id="home"
class="panel active">

<h2>¡Bienvenido!</h2>

<p>
Selecciona una sección del menú.
</p>

</div>


<div id="books"
class="panel">

<h2>📚 BOOKS</h2>

<div class="box">

Contenido de libros.

</div>

</div>


<div id="manuales"
class="panel">

<h2>📘 MANUALES</h2>

<div class="box">

Manuales y tutoriales.

</div>

</div>


<div id="store"
class="panel">

<h2>🛒 STORE</h2>

<div class="box">

Productos y recursos.

</div>

</div>


<div id="tonos"
class="panel">

<h2>🎵 TONOS</h2>

<div class="box">

Colección de tonos.

</div>

</div>


<div id="utilidades"
class="panel">

<h2>🛠 UTILIDADES</h2>

<div class="box">

Herramientas disponibles.

</div>

</div>

</div>

</div>

<script>

function openTab(id,el){

document
.querySelectorAll(".panel")
.forEach(
x=>x.classList.remove("active")
);

document
.getElementById(id)
.classList.add("active");

document
.querySelectorAll(".item")
.forEach(
x=>x.classList.remove("active")
);

el.classList.add("active");

}

</script>

</body>
</html>
