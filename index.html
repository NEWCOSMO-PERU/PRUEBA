<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Stock en GitHub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-4xl mx-auto bg-white shadow-md rounded-lg p-6">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">📦 Control de Stock con GitHub</h1>

        <!-- Configuración de Credenciales -->
        <div class="mb-6 p-4 bg-gray-50 rounded border">
            <h2 class="font-semibold text-gray-700 mb-2">Configuración de Conexión</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <input type="text" id="repoOwner" placeholder="Usuario de GitHub" class="p-2 border rounded text-sm">
                <input type="text" id="repoName" placeholder="Nombre del Repositorio" class="p-2 border rounded text-sm">
                <input type="password" id="githubToken" placeholder="GitHub Personal Access Token" class="p-2 border rounded text-sm">
            </div>
            <button onclick="cargarStock()" class="mt-3 bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 transition">Conectar / Cargar Stock</button>
        </div>

        <!-- Formulario Agregar Producto -->
        <div class="mb-6 p-4 bg-blue-50 rounded border border-blue-100">
            <h2 class="font-semibold text-blue-800 mb-2">Agregar Nuevo Producto</h2>
            <div class="flex gap-3">
                <input type="text" id="nuevoNombre" placeholder="Nombre del producto" class="flex-1 p-2 border rounded text-sm">
                <input type="number" id="nuevoCantidad" placeholder="Cantidad" class="w-32 p-2 border rounded text-sm">
                <button onclick="agregarProducto()" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700 transition">Añadir</button>
            </div>
        </div>

        <!-- Tabla de Stock -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200 text-gray-700 text-sm">
                        <th class="p-3">Producto</th>
                        <th class="p-3">Stock</th>
                        <th class="p-3 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaStock" class="text-sm divide-y divide-gray-200">
                    <tr>
                        <td colspan="3" class="p-4 text-center text-gray-500">Conéctate usando tus credenciales arriba para ver el inventario.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let fileSha = "";
        let productos = [];

        async function cargarStock() {
            const owner = document.getElementById('repoOwner').value;
            const repo = document.getElementById('repoName').value;
            const token = document.getElementById('githubToken').value;

            if (!owner || !repo || !token) {
                alert("Por favor completa todos los campos de configuración.");
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/stock.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (!response.ok) throw new Error("No se pudo cargar el archivo stock.json. Asegúrate de que exista en el repositorio.");

                const data = await response.json();
                fileSha = data.sha;
                
                // Decodificar contenido Base64 de GitHub
                const decodedContent = decodeURIComponent(escape(atob(data.content)));
                productos = JSON.parse(decodedContent);
                
                renderTabla();
                alert("Stock cargado exitosamente.");
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        function renderTabla() {
            const tbody = document.getElementById('tablaStock');
            tbody.innerHTML = "";

            if (productos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-gray-500">No hay productos registrados.</td></tr>`;
                return;
            }

            productos.forEach((prod, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-3">${prod.nombre}</td>
                        <td class="p-3 font-semibold">${prod.cantidad}</td>
                        <td class="p-3 text-center space-x-2">
                            <button onclick="cambiarCantidad(${index}, 1)" class="bg-gray-200 px-2 py-1 rounded hover:bg-gray-300 text-xs">+</button>
                            <button onclick="cambiarCantidad(${index}, -1)" class="bg-gray-200 px-2 py-1 rounded hover:bg-gray-300 text-xs">-</button>
                            <button onclick="eliminarProducto(${index})" class="text-red-600 hover:text-red-800 text-xs ml-2">Eliminar</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function guardarEnGitHub() {
            const owner = document.getElementById('repoOwner').value;
            const repo = document.getElementById('repoName').value;
            const token = document.getElementById('githubToken').value;

            const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(productos, null, 2))));

            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/stock.json`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: "Actualización automática de stock vía Web",
                    content: updatedContent,
                    sha: fileSha
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.message);
            }

            const data = await response.json();
            fileSha = data.content.sha;
        }

        async function agregarProducto() {
            const nombre = document.getElementById('nuevoNombre').value.trim();
            const cantidad = parseInt(document.getElementById('nuevoCantidad').value);

            if (!nombre || isNaN(cantidad)) {
                alert("Ingresa un nombre y una cantidad válida.");
                return;
            }

            productos.push({ nombre, cantidad });
            try {
                await guardarEnGitHub();
                document.getElementById('nuevoNombre').value = "";
                document.getElementById('nuevoCantidad').value = "";
                renderTabla();
            } catch (error) {
                alert("Error al guardar en GitHub: " + error.message);
                productos.pop(); // Revertir cambio local si falla
            }
        }

        async function cambiarCantidad(index, delta) {
            productos[index].cantidad += delta;
            if (productos[index].cantidad < 0) productos[index].cantidad = 0;

            try {
                await guardarEnGitHub();
                renderTabla();
            } catch (error) {
                alert("Error al actualizar: " + error.message);
                productos[index].cantidad -= delta; // Revertir
            }
        }

        async function eliminarProducto(index) {
            if (!confirm("¿Estás seguro de eliminar este producto?")) return;
            
            const eliminado = productos.splice(index, 1);
            try {
                await guardarEnGitHub();
                renderTabla();
            } catch (error) {
                alert("Error al eliminar: " + error.message);
                productos.splice(index, 0, eliminado[0]); // Revertir
            }
        }
    </script>
</body>
</html>
